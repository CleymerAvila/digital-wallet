<div class="modal-handle"></div>

<ion-content class="profile-modal-content">

  <!-- Botón cerrar -->
  <div class="modal-header">
    <ion-title>My Profile</ion-title>
    <ion-button slot="end" fill="clear" class="close-btn" (click)="close()">
      <ion-icon name="close-outline"></ion-icon>
    </ion-button>
  </div>

  <div class="profile-hero">
    @if((userProfile$ | async); as userProfile){
      <ion-grid>
        <ion-row class="ion-justify-content-center">
          <ion-col size="2">
            <ion-avatar class="profile-avatar">
              <img src="https://pbs.twimg.com/profile_images/2044188962877485056/bzto2TpW_400x400.jpg" />
            </ion-avatar>
          </ion-col>
        </ion-row>
        <ion-row class="ion-justify-content-center">
          <ion-col size="6">
            <ion-title> {{ userProfile.name }} {{ userProfile.lastName }} </ion-title>
          </ion-col>
        </ion-row>
        <ion-row class="ion-justify-content-center">
          <ion-col size="4">
            <ion-label> {{ userProfile.email }}</ion-label>
          </ion-col>
        </ion-row>
      </ion-grid>
    }
  </div>

  <form [formGroup]="updateForm" (ngSubmit)="saveChanges()">
    <!-- Opciones -->
    <ion-list lines="none" class="profile-list">
      @if((userProfile$ | async); as user){
        <app-custom-input
          formControlName="name"
          label="Nombre"
          labelPlacement="stacked"
          icon="person-outline"
          [value]="user.name"
        />
        <app-custom-input
          formControlName="lastName"
          label="Apellido"
          labelPlacement="stacked"
          icon="people-outline"
          [value]="user.lastName"
        />
      }
      <ion-toggle
      >
        <ion-icon name="finger-print-outline"></ion-icon>
        Biometric
      </ion-toggle>
      <br /><br />
    </ion-list>

    <!-- Logout -->
    <div class="button-section">
      <ion-button type="submit" expand="block" fill="solid" color="success" (click)="saveChanges()">Guardar Cambios</ion-button>
      <ion-button expand="block" fill="outline" color="danger" (click)="logout()">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        Log Out
      </ion-button>
    </div>

  </form>

</ion-content>
