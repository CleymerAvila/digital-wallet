<div class="modal-handle"></div>

<ion-content class="profile-modal-content">

  <!-- Botón cerrar -->
  <div class="modal-header">
    <ion-title>My Profile</ion-title>
    <ion-button slot="end" fill="clear" class="close-btn" (click)="close()">
      <ion-icon name="close-outline"></ion-icon>
    </ion-button>
  </div>

  <div class="profile-hero">
    <ion-grid>
      <ion-row class="ion-justify-content-center">
        <ion-col size="2">
          <ion-avatar class="profile-avatar">
            <img src="https://pbs.twimg.com/profile_images/2044188962877485056/bzto2TpW_400x400.jpg" />
          </ion-avatar>
        </ion-col>
      </ion-row>
      <ion-row class="ion-justify-content-center">
        <ion-col size="6">
          <ion-title> Cleymer Avila</ion-title>
        </ion-col>
      </ion-row>
      <ion-row class="ion-justify-content-center">
        <ion-col size="4">
          <ion-label>avila@gmail.com</ion-label>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <!-- Opciones -->
  <ion-list lines="none" class="profile-list">
    <app-custom-input
      label="Nombre"
      labelPlacement="stacked"
      icon="person-outline"
    />
    <app-custom-input
      label="Apellido"
      labelPlacement="stacked"
      icon="people-outline"
    />
    <ion-toggle
    >
      <ion-icon name="finger-print-outline"></ion-icon>
      Biometric
    </ion-toggle>
    <br /><br />
  </ion-list>

  <!-- Logout -->
  <div class="button-section">
    <ion-button expand="block" fill="solid" color="success">Guardar Cambios</ion-button>
    <ion-button expand="block" fill="outline" color="danger" (click)="logout()">
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      Log Out
    </ion-button>
  </div>

</ion-content>
